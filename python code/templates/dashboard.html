<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard</title>
    <style>
        body {
            font-family: 'Courier New', monospace;
            background: #1a1a2e;
            color: #00ff88;
            padding: 20px;
        }
        .container {
            max-width: 900px;
            margin: 0 auto;
        }
        h1 {
            text-align: center;
            border-bottom: 2px solid #00ff88;
            padding-bottom: 20px;
        }
        .dashboard-box {
            background: #16213e;
            border: 1px solid #00ff88;
            border-radius: 10px;
            padding: 30px;
            margin: 20px 0;
            white-space: pre-wrap;
            font-family: 'Courier New', monospace;
        }
        .nav-link {
            display: block;
            text-align: center;
            margin: 20px;
            color: #00ff88;
            font-size: 18px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>📊 Admin Dashboard</h1>
        
        <div class="dashboard-box">
            {{ dashboard }}
        </div>
        
        <a href="/" class="nav-link">🏠 Back to Scanner</a>
    </div>
</body>
</html>
